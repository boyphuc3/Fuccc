<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sao băng</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap');
    :root {
      color-scheme: dark;
      --bg1: #02050b;
      --bg2: #08111f;
      --glow: rgba(187, 204, 230, 0.7);
      --star: #f4f7fb;
      --font-display: "Cormorant Garamond", "Iowan Old Style", "Palatino Linotype", "Book Antiqua", "Times New Roman", serif;
      --font-ui: "Inter", "Avenir Next", "Segoe UI", system-ui, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      background:
        radial-gradient(circle at 20% 20%, rgba(90, 120, 255, 0.25), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(0, 220, 255, 0.12), transparent 28%),
        linear-gradient(180deg, var(--bg2), var(--bg1) 60%, #01030a);
      overflow: hidden;
    }
    .background {
      position: fixed;
      inset: 0;
      z-index: -3;
      overflow: hidden;
    }
    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      filter: none;
      transition: opacity 1400ms ease, filter 420ms ease;
    }
    body.scene-ready .background img {
      opacity: 0.93;
    }
    body.wish-open .background img {
      filter: blur(10px) brightness(0.55) saturate(0.85);
    }
    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 58%, rgba(8, 14, 24, 0.08) 100%);
    }
    .rift {
      position: fixed;
      inset: -6% -12% auto -12%;
      height: 60vh;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 45%, rgba(170, 185, 210, 0.15), transparent 34%),
        radial-gradient(circle at 50% 26%, rgba(130, 145, 165, 0.10), transparent 30%),
        radial-gradient(circle at 82% 46%, rgba(170, 185, 210, 0.13), transparent 34%);
      filter: blur(40px) saturate(72%);
      opacity: 0.7;
      animation: rift-drift 24s ease-in-out infinite alternate;
    }
    .rift::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0 47%, rgba(220, 230, 245, 0.12) 49%, rgba(220, 230, 245, 0.03) 51%, transparent 53%),
        radial-gradient(circle at 50% 50%, transparent 0 44%, rgba(1, 3, 10, 0.18) 72%, rgba(1, 3, 10, 0.38) 100%);
      opacity: 0.9;
    }
    @keyframes rift-drift {
      0% { transform: translate3d(-1.2%, -0.7%, 0) scale(1.01); }
      50% { transform: translate3d(0.9%, 1%, 0) scale(1.04); }
      100% { transform: translate3d(-0.4%, 1.3%, 0) scale(1.02); }
    }
    .sky {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 0 8px 1px rgba(220,230,245,0.18);
      animation: twinkle var(--twinkle, 4s) infinite ease-in-out;
      opacity: 0.16;
    }
    @keyframes twinkle {
      0%, 100% { transform: scale(1); opacity: 0.25; }
      50% { transform: scale(1.8); opacity: 1; }
    }
    .meteor {
      position: absolute;
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(239,243,250,0.92), rgba(180,192,210,0));
      filter: drop-shadow(0 0 10px rgba(187,204,230,0.28));
      transform: rotate(var(--angle, -35deg));
      animation: fly var(--duration, 1.8s) linear forwards;
    }
    .meteor::after {
      content: "";
      position: absolute;
      inset: -3px 0 -3px 0;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(210,222,236,0.25), rgba(255,255,255,0));
      filter: blur(7px);
      opacity: 0.82;
    }
    @keyframes fly {
      0% { transform: translate3d(0, 0, 0) rotate(var(--angle, -35deg)) scaleX(0.2); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translate3d(var(--dx, 420px), var(--dy, 420px), 0) rotate(var(--angle, -35deg)) scaleX(1); opacity: 0; }
    }
    .title {
      position: fixed;
      left: 50%;
      top: 8%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.88);
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: clamp(18px, 3vw, 34px);
      text-shadow: 0 0 24px rgba(159,215,255,0.35);
      user-select: none;
      pointer-events: none;
    }
    .subtitle {
      display: block;
      font-size: 0.42em;
      letter-spacing: 0.16em;
      margin-top: 0.6em;
      opacity: 0.7;
    }
    .music-btn {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 5;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(6, 10, 24, 0.55);
      color: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 12px 16px;
      font: 600 14px/1 system-ui, sans-serif;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(0,0,0,0.28);
    }
    .music-btn:hover {
      border-color: rgba(159,215,255,0.45);
      box-shadow: 0 0 0 3px rgba(159,215,255,0.12), 0 10px 32px rgba(0,0,0,0.35);
    }
    .music-status {
      position: fixed;
      right: 18px;
      top: 64px;
      z-index: 5;
      color: rgba(255,255,255,0.68);
      font-size: 12px;
      letter-spacing: 0.06em;
      user-select: none;
    }
    .audio-hint {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 5;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(6, 10, 24, 0.58);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      letter-spacing: 0.04em;
      backdrop-filter: blur(10px);
      user-select: none;
      pointer-events: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .music-dock {
      position: fixed;
      right: 4px;
      bottom: 4px;
      z-index: 6;
      display: grid;
      gap: 0;
      justify-items: end;
    }
    .music-chip {
      display: inline-flex;
      align-items: center;
      gap: 0;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background:
        linear-gradient(135deg, rgba(14, 20, 32, 0.78), rgba(7, 10, 19, 0.5)),
        rgba(6, 10, 24, 0.58);
      backdrop-filter: blur(12px) saturate(130%);
      box-shadow:
        0 10px 28px rgba(0,0,0,0.26),
        inset 0 1px 0 rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
      font: 600 12px/1 var(--font-ui);
      letter-spacing: 0.03em;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      position: relative;
      overflow: hidden;
    }
    .music-chip::before {
      content: "";
      position: absolute;
      inset: -1px;
      background: radial-gradient(circle at 20% 20%, rgba(159,215,255,0.18), transparent 32%);
      opacity: 0.85;
      pointer-events: none;
    }
    .music-chip.playing {
      border-color: rgba(159,215,255,0.34);
      box-shadow:
        0 14px 34px rgba(0,0,0,0.3),
        0 0 0 1px rgba(159,215,255,0.08),
        0 0 28px rgba(159,215,255,0.12);
    }
    .music-chip.cue {
      border-color: rgba(234, 246, 255, 0.44);
      box-shadow:
        0 14px 34px rgba(0,0,0,0.28),
        0 0 0 1px rgba(219, 238, 255, 0.2),
        0 0 36px rgba(205, 232, 255, 0.24);
    }
    .music-chip:hover {
      transform: translateY(-1px);
      border-color: rgba(159,215,255,0.3);
      box-shadow:
        0 14px 34px rgba(0,0,0,0.3),
        0 0 0 1px rgba(159,215,255,0.08),
        0 0 20px rgba(159,215,255,0.08);
    }
    .music-chip button {
      border: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.95), rgba(255,255,255,0.6) 30%, transparent 52%),
        linear-gradient(135deg, #f8fbff, #bcdcff 45%, #87b9e8 100%);
      color: #09101c;
      cursor: pointer;
      box-shadow:
        0 8px 20px rgba(159,215,255,0.18),
        inset 0 1px 0 rgba(255,255,255,0.65);
      font-size: 9px;
      font-weight: 800;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
      position: relative;
    }
    .music-chip button::after {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid rgba(159,215,255,0.18);
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 180ms ease, transform 180ms ease;
    }
    .music-chip:hover button {
      transform: scale(1.05);
      filter: brightness(1.03);
      box-shadow:
        0 10px 22px rgba(159,215,255,0.22),
        inset 0 1px 0 rgba(255,255,255,0.72);
    }
    .music-chip:hover button::after {
      opacity: 1;
      transform: scale(1);
    }
    .music-chip:active button {
      transform: scale(0.98);
    }
    .music-label {
      display: none;
    }
    .music-progress {
      width: 58px;
      height: 2px;
      border-radius: 999px;
      margin: 2px 8px 0;
      background: rgba(255,255,255,0.16);
      overflow: hidden;
      align-self: center;
    }
    .music-progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(173, 223, 255, 0.4), rgba(239, 248, 255, 0.92));
      box-shadow: 0 0 10px rgba(189, 224, 247, 0.24);
      transition: width 200ms linear;
    }
    .brand {
      position: fixed;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      z-index: 5;
      font-family: var(--font-display);
      font-size: clamp(24px, 5vw, 58px);
      font-style: italic;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(233,238,244,0.88) 38%, rgba(182,194,210,0.68) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow:
        0 1px 2px rgba(0,0,0,0.18),
        0 0 14px rgba(187,204,230,0.06);
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
      animation: brand-fade 20s ease-out forwards;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.12));
    }
    .brand::after {
      content: "";
      position: absolute;
      inset: -18px -26px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 62%);
      filter: blur(14px);
      z-index: -1;
      opacity: 0.55;
    }
    .brand::before {
      content: "";
      position: absolute;
      left: 50%;
      top: calc(100% + 14px);
      width: 42%;
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.72), transparent);
      opacity: 0.42;
      filter: blur(0.2px);
    }
    @keyframes brand-fade {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.94; filter: blur(0px); }
      70% { transform: translate(-50%, -50%) scale(1); opacity: 0.92; filter: blur(0px); }
      86% { transform: translate(-50%, -50%) scale(1.01); opacity: 0.55; filter: blur(0.8px); }
      100% { transform: translate(-50%, -50%) scale(1.03); opacity: 0; filter: blur(3px); }
    }
    .brand-smoke {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      overflow: hidden;
    }
    .heart-field {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      overflow: hidden;
    }
    .heart {
      position: absolute;
      left: 50%;
      top: 74%;
      color: rgba(0, 0, 0, 1);
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
      font-size: var(--size, 16px);
      transform: translate(-50%, 0) scale(0.95);
      opacity: 0;
      animation: heart-float var(--dur, 7s) ease-out forwards;
      filter: blur(0.15px) saturate(0);
    }
    @keyframes heart-float {
      0% {
        transform: translate(-50%, 22px) scale(0.55) rotate(-6deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translate(calc(-50% + var(--dx, 0px)), var(--dy, -190px)) scale(var(--scale, 1.9)) rotate(var(--rot, 16deg));
        opacity: 0;
      }
    }
    .smoke-puff {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(228, 233, 240, 0.72) 0%, rgba(228, 233, 240, 0.18) 40%, transparent 72%);
      filter: blur(1px);
      opacity: 0;
      animation: smoke-rise var(--dur, 3.6s) ease-out forwards;
    }
    @keyframes smoke-rise {
      0% { transform: translate3d(0, 0, 0) scale(0.8); opacity: 0; }
      8% { opacity: var(--op, 0.45); }
      100% { transform: translate3d(var(--dx, 0px), var(--dy, -160px), 0) scale(var(--sc, 4.5)); opacity: 0; }
    }
    .seam {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(78vw, 1100px);
      height: 2px;
      transform: translateX(-50%) rotate(-6deg);
      z-index: 4;
      pointer-events: none;
      background: linear-gradient(90deg, transparent 0%, rgba(238, 243, 250, 0.08) 18%, rgba(238, 243, 250, 0.46) 50%, rgba(238, 243, 250, 0.08) 82%, transparent 100%);
      filter: blur(1.4px) drop-shadow(0 0 14px rgba(187,204,230,0.18));
      opacity: 0.42;
      animation: seam-breathe 7s ease-in-out infinite;
    }
    .seam::before,
    .seam::after {
      content: "";
      position: absolute;
      inset: -7px 0;
      background: linear-gradient(90deg, transparent 0%, rgba(238, 243, 250, 0.06) 20%, rgba(238, 243, 250, 0.25) 50%, rgba(238, 243, 250, 0.06) 80%, transparent 100%);
      filter: blur(8px);
      opacity: 0.35;
    }
    .seam::after {
      inset: -16px 0;
      opacity: 0.16;
      filter: blur(18px);
    }
    .blessing {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 8;
      width: min(86vw, 760px);
      padding: 22px 24px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.008);
      background: rgba(5, 9, 20, 0.015);
      backdrop-filter: blur(0.8px);
      color: rgba(236, 242, 250, 0.78);
      text-align: center;
      font: 400 italic clamp(16px, 2.3vw, 22px)/1.8 var(--font-display);
      letter-spacing: 0.03em;
      opacity: 0;
      visibility: hidden;
      transition: opacity 1400ms ease;
      pointer-events: none;
      text-wrap: balance;
    }
    .blessing.show {
      opacity: 1;
      visibility: visible;
      animation: blessing-breathe 5600ms ease-in-out infinite;
    }
    .blessing-line {
      display: block;
      opacity: 0;
      transform: translateY(14px) scale(0.985);
      filter: blur(2.4px);
      transition: opacity 1800ms ease, transform 1800ms ease, filter 1800ms ease;
    }
    .blessing-line + .blessing-line {
      margin-top: 6px;
    }
    .blessing-line.show {
      opacity: 0.84;
      transform: translateY(0) scale(1);
      filter: blur(0);
      animation: blessing-line-cinematic 4600ms ease-in-out both;
    }
    .blessing.vanish {
      animation: blessing-smoke-out 3800ms ease-out forwards;
    }
    .blessing-line.smoke {
      animation: blessing-line-smoke 3400ms ease-out forwards;
      animation-delay: var(--smoke-delay, 0ms);
    }
    .blessing-puff {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(238, 243, 251, 0.65) 0%, rgba(230, 238, 248, 0.18) 42%, transparent 78%);
      filter: blur(1px);
      opacity: 0;
      pointer-events: none;
      animation: blessing-puff-rise var(--dur, 2400ms) ease-out forwards;
      animation-delay: var(--delay, 0ms);
    }
    .epilogue {
      position: fixed;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      z-index: 8;
      color: rgba(234, 240, 248, 0.72);
      font: 400 italic clamp(14px, 1.9vw, 18px)/1.5 var(--font-display);
      letter-spacing: 0.14em;
      text-shadow: 0 0 12px rgba(170, 200, 226, 0.2);
      opacity: 0;
      pointer-events: none;
    }
    .epilogue.show {
      animation: epilogue-fade 5.8s ease-in-out forwards;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(12, 18, 30, 0.2), rgba(2, 4, 10, 0.9) 74%, rgba(1, 2, 6, 0.98) 100%),
        linear-gradient(180deg, rgba(4, 7, 12, 0.72), rgba(3, 5, 10, 0.86)),
        url('z7773202571825_3d5e1c34a28789c434ca1717cd6f7029.jpg') center center / cover no-repeat;
      color: rgba(236, 242, 251, 0.94);
      font: 500 clamp(14px, 1.8vw, 18px)/1.4 var(--font-ui);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: opacity 900ms ease, visibility 900ms ease;
      backdrop-filter: blur(4px) saturate(70%);
      text-shadow:
        0 2px 12px rgba(0, 0, 0, 0.45),
        0 0 18px rgba(170, 196, 232, 0.18);
      justify-items: center;
      align-items: center;
      text-align: center;
    }
    .loading-dots {
      display: inline-flex;
      margin-left: 4px;
      gap: 2px;
      font-size: 1.5em;
    }
    .loading-dots span {
      opacity: 0.2;
      animation: loading-dot 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    .loading-overlay.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .wish-panel {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 19;
      width: min(92vw, 520px);
      padding: 16px;
      border-radius: 24px;
      border: 1px solid rgba(226, 202, 149, 0.2);
      background:
        linear-gradient(155deg, rgba(4, 7, 13, 0.88), rgba(2, 4, 8, 0.84)),
        radial-gradient(circle at 8% 8%, rgba(226, 202, 149, 0.1), transparent 38%);
      backdrop-filter: blur(26px) saturate(112%);
      box-shadow:
        0 24px 58px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 0 28px rgba(226, 202, 149, 0.06);
      color: rgba(241, 246, 253, 0.95);
      transition: opacity 420ms ease, transform 420ms ease, visibility 420ms ease;
    }
    .wish-panel.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translate(-50%, -46%);
    }
    .wish-title {
      margin: 0 0 10px;
      font: 600 clamp(15px, 2vw, 18px)/1.35 var(--font-display);
      letter-spacing: 0.06em;
      color: rgba(242, 227, 188, 0.95);
      text-shadow: 0 8px 20px rgba(0, 0, 0, 0.45), 0 0 18px rgba(229, 205, 150, 0.14);
    }
    .wish-input {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      border-radius: 16px;
      border: 1px solid rgba(226, 202, 149, 0.22);
      background:
        linear-gradient(165deg, rgba(255,255,255,0.07), rgba(255,255,255,0.01)),
        rgba(3, 7, 13, 0.58);
      color: rgba(246, 249, 254, 0.96);
      padding: 12px 14px;
      font: 500 14px/1.6 var(--font-ui);
      letter-spacing: 0.01em;
      outline: none;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 10px 22px rgba(0,0,0,0.2);
      transition: border-color 220ms ease, background 220ms ease, box-shadow 220ms ease, transform 220ms ease;
    }
    .wish-input:focus {
      border-color: rgba(240, 216, 158, 0.58);
      background:
        linear-gradient(165deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03)),
        rgba(5, 10, 18, 0.64);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        0 0 0 3px rgba(235, 212, 157, 0.16),
        0 14px 28px rgba(0,0,0,0.26);
      transform: translateY(-1px);
    }
    .wish-input::placeholder {
      color: rgba(232, 239, 248, 0.54);
      font-style: italic;
    }
    .wish-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .wish-btn {
      border: 1px solid rgba(226, 202, 149, 0.2);
      border-radius: 999px;
      background: linear-gradient(165deg, rgba(13, 22, 37, 0.9), rgba(8, 13, 22, 0.9));
      color: rgba(245, 237, 218, 0.95);
      font: 600 13px/1 var(--font-ui);
      letter-spacing: 0.03em;
      padding: 10px 14px;
      cursor: pointer;

<body data-bg="1" data-music="1">
  <div class="background">
    <img id="bgImage" alt="" />
  </div>
  <div class="rift"></div>
  <div class="seam"></div>
  <div class="sky" id="sky"></div>
  <div class="heart-field" id="heartField"></div>
  <div class="brand-smoke" id="brandSmoke"></div>
  <div class="music-dock">
    <div class="music-chip" id="musicChip">
      <button id="playBtn" type="button" aria-label="Phát hoặc dừng nhạc">▶</button>
      <div class="music-progress" aria-hidden="true"><div class="music-progress-bar" id="musicProgressBar"></div></div>
    </div>
    <audio id="bgm" preload="none">
      <source src="music.m4a" />
    </audio>
  </div>
  <div class="brand">Phanh Lộc</div>
  <div class="blessing" id="blessingMessage">
    <span class="blessing-line">Chặng đường mới chắc sẽ nhiều thử thách nhưng cũng đầy cơ hội.</span>
    <span class="blessing-line">Bọn tao chúc Phanh tương lai sáng lạn, thành công rực rỡ.</span>
    <span class="blessing-line">Bọn tao chờ Phanh về hội ngộ trong túi đựng tiền tỉ, tay lái ô tô, yêu Phanh ❤️</span>
  </div>
  <div class="epilogue" id="epilogueMessage">Hẹn ngày hội ngộ.</div>
  <div class="wish-panel" id="wishPanel">
    <p class="wish-title">Heartfelt Notes for Phanh</p>
    <input id="wishNameInput" class="wish-input" style="min-height:auto;height:40px;margin-bottom:8px;" maxlength="40" placeholder="Your Name" />
    <textarea id="wishInput" class="wish-input" maxlength="280" placeholder="Writes......." ></textarea>
    <div class="wish-actions">
      <button type="button" class="wish-btn danger" id="wishClearBtn">Clear</button>
      <button type="button" class="wish-btn" id="wishSkipBtn">Later</button>
      <button type="button" class="wish-btn primary" id="wishSaveBtn">Send</button>
    </div>
    <div class="wish-status" id="wishStatus"></div>
  </div>
  <div class="wishes-wall" id="wishesWall" style="display:none;"><div id="wishesList"></div></div>
  <div class="loading-overlay" id="loadingOverlay"><span class="loading-dots"><span>.</span><span>.</span><span>.</span></span></div>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    const EMAILJS_PUBLIC_KEY = 'rbFLlPz18RcEoThD8';
    const EMAILJS_SERVICE_ID = 'service_pb0ykc5';
    const EMAILJS_TEMPLATE_ID = 'template_r3inua3';
    const WISH_RECIPIENT_EMAIL = 'bichanh25474@gmail.com';
    const sky = document.getElementById('sky');
    const heartField = document.getElementById('heartField');
    const brand = document.querySelector('.brand');
    const brandSmoke = document.getElementById('brandSmoke');
    const bgImage = document.getElementById('bgImage');
    const bgm = document.getElementById('bgm');
    const playBtn = document.getElementById('playBtn');
    const musicChip = document.getElementById('musicChip');
    const musicProgressBar = document.getElementById('musicProgressBar');
    const blessingMessage = document.getElementById('blessingMessage');
    const epilogueMessage = document.getElementById('epilogueMessage');
    const wishPanel = document.getElementById('wishPanel');
    const wishNameInput = document.getElementById('wishNameInput');
    const wishInput = document.getElementById('wishInput');
    const wishSaveBtn = document.getElementById('wishSaveBtn');
    const wishClearBtn = document.getElementById('wishClearBtn');
    const wishSkipBtn = document.getElementById('wishSkipBtn');
    const wishStatus = document.getElementById('wishStatus');
    const loadingOverlay = document.getElementById('loadingOverlay');
    let isStartingMusic = false;
    let blessingTimerId = null;
    let hasShownBlessing = false;
    let blessingVanishStarted = false;
    let blessingLinesShown = 0;
    let blessingVanishAt = Infinity;
    let epilogueAt = Infinity;
    const blessingBeatTimes = [15.0, 18.2, 21.6];

    if (document.body.dataset.bg === '1') {
      bgImage.src = 'z7771436536221_a1c4348aa46cee7ced7ad50068ca783b.jpg';
    }
    const hasMusic = document.body.dataset.music === '1';
    if (!hasMusic) {
      bgm.setAttribute('disabled', 'disabled');
    }

    function addStars(count = 72) {
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';
        star.style.setProperty('--twinkle', (2 + Math.random() * 5) + 's');
        star.style.opacity = (0.2 + Math.random() * 0.8).toFixed(2);
        star.style.transform = 'scale(' + (0.6 + Math.random() * 1.4).toFixed(2) + ')';
        sky.appendChild(star);
      }
    }

    function spawnMeteor() {
      const meteor = document.createElement('div');
      meteor.className = 'meteor';
      const startX = Math.random() * window.innerWidth * 0.8;
      const startY = Math.random() * window.innerHeight * 0.35;
      const angle = -22 - Math.random() * 20;
      const longTrail = Math.random() > 0.7;
      const dx = (longTrail ? 560 : 280) + Math.random() * (longTrail ? 520 : 380);
      const dy = (longTrail ? 330 : 210) + Math.random() * (longTrail ? 320 : 240);
      meteor.style.left = startX + 'px';
      meteor.style.top = startY + 'px';
      meteor.style.setProperty('--angle', angle + 'deg');
      meteor.style.setProperty('--dx', dx + 'px');
      meteor.style.setProperty('--dy', dy + 'px');
      meteor.style.width = (longTrail ? 260 : 180) + 'px';
      meteor.style.setProperty('--duration', (1.15 + Math.random() * (longTrail ? 1.4 : 1.0)) + 's');
      meteor.style.opacity = longTrail ? '0.95' : '0.88';
      sky.appendChild(meteor);
      meteor.addEventListener('animationend', () => meteor.remove());
    }

    function addDust(count = 12) {
      for (let i = 0; i < count; i++) {
        const dust = document.createElement('div');
        dust.className = 'star';
        dust.style.width = '1px';
        dust.style.height = '1px';
        dust.style.left = Math.random() * 100 + 'vw';
        dust.style.top = Math.random() * 100 + 'vh';
        dust.style.opacity = (0.06 + Math.random() * 0.18).toFixed(2);
        dust.style.setProperty('--twinkle', (6 + Math.random() * 8) + 's');
        dust.style.transform = 'scale(' + (0.35 + Math.random() * 0.7).toFixed(2) + ')';
        sky.appendChild(dust);
      }
    }

    function addMist(count = 4) {
      for (let i = 0; i < count; i++) {
        const mist = document.createElement('div');
        mist.className = 'star';
        mist.style.width = (18 + Math.random() * 46) + 'px';
        mist.style.height = '1px';
        mist.style.left = (Math.random() * 100) + 'vw';
        mist.style.top = (18 + Math.random() * 64) + 'vh';
        mist.style.opacity = (0.03 + Math.random() * 0.08).toFixed(2);
        mist.style.filter = 'blur(4px)';
        mist.style.setProperty('--twinkle', (10 + Math.random() * 10) + 's');
        mist.style.transform = 'rotate(' + (-10 + Math.random() * 20).toFixed(1) + 'deg)';
        sky.appendChild(mist);
      }
    }

    function emitSmokeBurst() {
      const rect = brand.getBoundingClientRect();
      const count = 36;
      for (let i = 0; i < count; i++) {
        const puff = document.createElement('div');
        puff.className = 'smoke-puff';
        const x = rect.left + rect.width * (0.08 + Math.random() * 0.84);
        const y = rect.top + rect.height * (0.2 + Math.random() * 0.6);
        const dx = (-28 + Math.random() * 56).toFixed(1) + 'px';
        const dy = (-90 - Math.random() * 170).toFixed(1) + 'px';
        puff.style.left = x + 'px';
        puff.style.top = y + 'px';
        puff.style.setProperty('--dx', dx);
        puff.style.setProperty('--dy', dy);
        puff.style.setProperty('--sc', (3.2 + Math.random() * 4.5).toFixed(2));
        puff.style.setProperty('--dur', (2.4 + Math.random() * 1.8).toFixed(2) + 's');
        puff.style.setProperty('--op', (0.18 + Math.random() * 0.35).toFixed(2));
        brandSmoke.appendChild(puff);
        puff.addEventListener('animationend', () => puff.remove());
      }
    }

    function emitHeartBurst() {
      const count = 8;
      for (let i = 0; i < count; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = '❤';
        const spread = (Math.random() * 180 - 90).toFixed(1) + 'px';
        const rise = (-220 - Math.random() * 180).toFixed(1) + 'px';
        heart.style.left = (50 + Math.random() * 6 - 3).toFixed(2) + '%';
        heart.style.top = (76 + Math.random() * 4 - 2).toFixed(2) + '%';
        heart.style.setProperty('--dx', spread);
        heart.style.setProperty('--dy', rise);
        heart.style.setProperty('--dur', (6.4 + Math.random() * 0.7).toFixed(2) + 's');
        heart.style.setProperty('--scale', (0.9 + Math.random() * 0.7).toFixed(2));
        heart.style.setProperty('--rot', (-16 + Math.random() * 32).toFixed(1) + 'deg');
        heart.style.setProperty('--size', (12 + Math.random() * 8).toFixed(0) + 'px');
        heartField.appendChild(heart);
        heart.addEventListener('animationend', () => heart.remove());
      }
    }

    function setMusicUiState(isPlaying) {
      playBtn.textContent = isPlaying ? '⏸' : '▶';
      musicChip.classList.toggle('playing', isPlaying);
      if (!isPlaying) musicChip.classList.remove('cue');
    }

    async function startMusic() {
      if (!hasMusic || isStartingMusic) return false;
      isStartingMusic = true;
      playBtn.disabled = true;
      try {
        bgm.volume = 1;
        await bgm.play();
        setMusicUiState(true);
        return true;
      } catch (err) {
        setMusicUiState(false);
        return false;
      } finally {
        isStartingMusic = false;
        playBtn.disabled = false;
      }
    }

    async function toggleMusic() {
      if (!hasMusic) return;
      if (bgm.paused) {
        if (bgm.readyState < 2) bgm.load();
        setMusicUiState(true);
        const started = await startMusic();
        if (!started) setMusicUiState(false);
      } else {
        bgm.pause();
        setMusicUiState(false);
      }
    }

    function warmAudio() {
      if (!hasMusic) return;
      bgm.preload = 'metadata';
      bgm.load();
    }

    function updateMusicProgress() {
      if (!musicProgressBar || !bgm.duration || Number.isNaN(bgm.duration)) return;
      const pct = Math.min(100, Math.max(0, (bgm.currentTime / bgm.duration) * 100));
      musicProgressBar.style.width = pct.toFixed(2) + '%';
    }

    function handlePlaybackCue() {
      if (hasShownBlessing || bgm.paused) {
        musicChip.classList.remove('cue');
        return;
      }
      const shouldCue = bgm.currentTime >= 12 && bgm.currentTime < 15;
      musicChip.classList.toggle('cue', shouldCue);
    }

    function showBlessingMessage() {
      if (!blessingMessage || hasShownBlessing) return;
      hasShownBlessing = true;
      blessingMessage.classList.add('show');
      const lines = blessingMessage.querySelectorAll('.blessing-line');
      blessingLinesShown = 0;
      blessingVanishStarted = false;
      const lastBeat = blessingBeatTimes[Math.min(blessingBeatTimes.length, lines.length) - 1] || 15;
      blessingVanishAt = lastBeat + 15;
      epilogueAt = blessingVanishAt + 4.2;
    }

    function updateBlessingByMusicTime() {
      if (!hasShownBlessing || !blessingMessage) return;
      const lines = blessingMessage.querySelectorAll('.blessing-line');
      for (let i = blessingLinesShown; i < lines.length; i++) {
        const beatAt = blessingBeatTimes[i] ?? (blessingBeatTimes[blessingBeatTimes.length - 1] + (i - blessingBeatTimes.length + 1) * 2.2);
        if (bgm.currentTime >= beatAt) {
          lines[i].classList.add('show');
          blessingLinesShown = i + 1;
        } else {
          break;
        }
      }
      if (!blessingVanishStarted && bgm.currentTime >= blessingVanishAt) {
        blessingVanishStarted = true;
        emitBlessingSmoke();
        lines.forEach((line, index) => {
          line.style.setProperty('--smoke-delay', (index * 220) + 'ms');
          line.classList.add('smoke');
        });
        blessingMessage.classList.add('vanish');
      }
      if (bgm.currentTime >= epilogueAt) {
        showEpilogueMessage();
      }
    }

    function showEpilogueMessage() {
      if (!epilogueMessage) return;
      epilogueMessage.classList.add('show');
    }

    function getSceneProfile() {
      const isMobile = window.matchMedia('(max-width: 700px)').matches;
      if (isMobile) {
        return { stars: 28, meteorInterval: 2600, initialMeteors: 1, heartBurst: false };
      }
      return { stars: 52, meteorInterval: 1700, initialMeteors: 2, heartBurst: true };
    }

    function hideLoadingOverlay() {
      if (!loadingOverlay) return;
      loadingOverlay.classList.add('hide');
      document.body.classList.add('scene-ready');
    }

    function openWishPanel() {
      if (!wishPanel) return;
      wishPanel.classList.remove('hidden');
      document.body.classList.add('wish-open');
      if (wishInput) wishInput.value = '';
      if (wishInput) wishInput.focus();
    }

    function closeWishPanel() {
      if (!wishPanel) return;
      wishPanel.classList.add('hidden');
      document.body.classList.remove('wish-open');
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function setWishStatus(text, isError = false) {
      if (!wishStatus) return;
      wishStatus.textContent = text;
      wishStatus.style.color = isError ? 'rgba(255, 191, 191, 0.92)' : 'rgba(223, 236, 251, 0.8)';
    }

    function canSendWishEmail() {
      return (
        typeof window.emailjs !== 'undefined' &&
        !EMAILJS_PUBLIC_KEY.startsWith('PASTE_') &&
        !EMAILJS_SERVICE_ID.startsWith('PASTE_') &&
        !EMAILJS_TEMPLATE_ID.startsWith('PASTE_') &&
        !WISH_RECIPIENT_EMAIL.startsWith('PASTE_')
      );
    }

    async function sendWishToEmail(name, text) {
      if (!canSendWishEmail()) return false;
      window.emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
      const senderName = name || 'Bạn ẩn danh';
      const sentAt = new Date().toLocaleString('vi-VN');
      const result = await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        from_name: senderName,
        name: senderName,
        wish_message: text,
        message: text,
        content: text,
        to_email: WISH_RECIPIENT_EMAIL,
        sent_at: sentAt,
        time: sentAt
      });
      if (!result || (result.status !== 200 && result.text !== 'OK')) {
        throw new Error('EMAILJS_UNEXPECTED_RESPONSE');
      }
      return true;
    }

    async function submitWishMessage() {
      const text = (wishInput?.value || '').trim();
      const name = (wishNameInput?.value || '').trim();
      if (!text) {
        setWishStatus('Bạn hãy nhập lời chúc trước nhé.', true);
        return;
      }
      try {
        setWishStatus('Đang gửi lời chúc...');
        if (wishSaveBtn) wishSaveBtn.disabled = true;
        localStorage.setItem('guestWishMessage', text);
        if (wishInput) wishInput.value = '';
        let emailed = false;
        let emailError = '';
        try {
          emailed = await sendWishToEmail(name, text);
        } catch (err) {
          emailError = err?.text || err?.message || 'EMAILJS_SEND_FAILED';
        }
        setWishStatus(
          emailed
            ? 'Đã gửi lời chúc + email thành công.'
            : 'Đã gửi lời chúc, nhưng email lỗi: ' + emailError,
          !emailed
        );
        if (emailed) {
          if (hasMusic && bgm.paused) {
            if (bgm.readyState < 2) bgm.load();
            await startMusic();
          }
          closeWishPanel();
        } else {
          console.error('EmailJS send failed:', emailError);
        }
      } catch (err) {
        setWishStatus('Lỗi kết nối, bạn thử lại nhé.', true);
      } finally {
        if (wishSaveBtn) wishSaveBtn.disabled = false;
      }
    }

    async function clearAllWishes() {
      if (!wishInput) return;
      wishInput.value = '';
      setWishStatus('Đã xóa nội dung đang nhập.');
    }

    async function skipWishAndPlay() {
      if (hasMusic && bgm.paused) {
        if (bgm.readyState < 2) bgm.load();
        await startMusic();
      }
      closeWishPanel();
    }

    function emitBlessingSmoke() {
      if (!blessingMessage) return;
      const rect = blessingMessage.getBoundingClientRect();
      const count = 42;
      for (let i = 0; i < count; i++) {
        const puff = document.createElement('span');
        puff.className = 'blessing-puff';
        const x = rect.left + rect.width * (0.08 + Math.random() * 0.84);
        const y = rect.top + rect.height * (0.2 + Math.random() * 0.65);
        puff.style.left = x + 'px';
        puff.style.top = y + 'px';
        puff.style.setProperty('--dx', (-44 + Math.random() * 88).toFixed(1) + 'px');
        puff.style.setProperty('--dy', (-110 - Math.random() * 170).toFixed(1) + 'px');
        puff.style.setProperty('--sc', (2.8 + Math.random() * 3.6).toFixed(2));
        puff.style.setProperty('--dur', (1900 + Math.random() * 1700).toFixed(0) + 'ms');
        puff.style.setProperty('--delay', (Math.random() * 500).toFixed(0) + 'ms');
        puff.style.setProperty('--op', (0.34 + Math.random() * 0.36).toFixed(2));
        document.body.appendChild(puff);
        puff.addEventListener('animationend', () => puff.remove());
      }
    }

    function scheduleBlessingMessage() {
      if (blessingTimerId || hasShownBlessing) return;
      blessingTimerId = setTimeout(() => {
        blessingTimerId = null;
        showBlessingMessage();
      }, 15000);
    }

    const scene = getSceneProfile();
    warmAudio();

    addStars(scene.stars);
    addDust();
    addMist();
    if (scene.heartBurst) emitHeartBurst();
    setInterval(spawnMeteor, scene.meteorInterval);
    for (let i = 0; i < scene.initialMeteors; i++) {
      setTimeout(spawnMeteor, i * 900);
    }
    setTimeout(emitSmokeBurst, 14800);
    playBtn.addEventListener('click', toggleMusic);
    bgm.addEventListener('play', scheduleBlessingMessage);
    bgm.addEventListener('timeupdate', updateMusicProgress);
    bgm.addEventListener('timeupdate', handlePlaybackCue);
    bgm.addEventListener('timeupdate', updateBlessingByMusicTime);
    bgm.addEventListener('pause', handlePlaybackCue);
    bgm.addEventListener('ended', handlePlaybackCue);
    if (wishSaveBtn) wishSaveBtn.addEventListener('click', submitWishMessage);
    if (wishClearBtn) wishClearBtn.addEventListener('click', clearAllWishes);
    if (wishSkipBtn) wishSkipBtn.addEventListener('click', skipWishAndPlay);
    if (wishInput) {
      wishInput.addEventListener('keydown', (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
          submitWishMessage();
        }
      });
    }
    window.addEventListener('load', () => {
      openWishPanel();
      setTimeout(hideLoadingOverlay, 3000);
    });
  </script>
</body>
</html>
